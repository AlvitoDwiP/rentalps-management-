$kind: http-request
description: Ambil semua transaksi yang masih ACTIVE. Endpoint ini membutuhkan JWT.
url: "{{baseUrl}}/api/transactions/active"
method: GET
headers:
  Authorization: Bearer {{token}}
scripts:
  - type: afterResponse
    code: |-
      const json = pm.response.json();
      pm.test("status 200", () => pm.response.to.have.status(200));
      pm.test("success true", () => pm.expect(json.success).to.eql(true));
      pm.test("data is array", () => pm.expect(json.data).to.be.an("array"));
    language: text/javascript
order: 1000
