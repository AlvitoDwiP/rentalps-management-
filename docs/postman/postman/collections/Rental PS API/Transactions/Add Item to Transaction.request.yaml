$kind: http-request
description: Menambahkan item produk ke transaksi aktif menggunakan productName dan quantity. Endpoint ini membutuhkan JWT.
url: "{{baseUrl}}/api/transactions/{{transactionId}}/items"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: json
  content: |-
    {
      "productName": "{{productName}}",
      "quantity": 1
    }
scripts:
  - type: afterResponse
    code: |-
      const json = pm.response.json();
      pm.test("status 200 or 201", () => {
        pm.expect([200, 201]).to.include(pm.response.code);
      });
      pm.test("success true", () => pm.expect(json.success).to.eql(true));
      pm.test("response data exists", () => pm.expect(json.data).to.exist);
    language: text/javascript
order: 3000
