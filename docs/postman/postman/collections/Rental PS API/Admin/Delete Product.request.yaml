$kind: http-request
description: Soft delete product dengan mengubah isActive menjadi false.
url: "{{baseUrl}}/api/admin/products/{{adminProductId}}"
method: DELETE
headers:
  Authorization: Bearer {{token}}
scripts:
  - type: afterResponse
    code: |-
      const json = pm.response.json();
      pm.test("status 200", () => pm.response.to.have.status(200));
      pm.test("success true", () => pm.expect(json.success).to.eql(true));
    language: text/javascript
order: 3000
