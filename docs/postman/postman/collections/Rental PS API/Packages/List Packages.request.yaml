$kind: http-request
description: Ambil daftar rental package yang aktif untuk tiap tipe console. Endpoint ini membutuhkan JWT.
url: "{{baseUrl}}/api/packages"
method: GET
headers:
  Authorization: Bearer {{token}}
scripts:
  - type: afterResponse
    code: |-
      const json = pm.response.json();
      pm.test("status 200", () => pm.response.to.have.status(200));
      pm.test("success true", () => pm.expect(json.success).to.eql(true));
      pm.test("data is array", () => pm.expect(json.data).to.be.an("array"));
      pm.test("minimal 1 package", () => pm.expect(json.data.length).to.be.at.least(1));
      if (json.data && json.data.length > 0 && json.data[0].id) {
        pm.collectionVariables.set("packageId", json.data[0].id);
      }
    language: text/javascript
order: 1000
