$kind: http-request
description: Ambil daftar produk makanan dan minuman untuk transaksi tambahan. Endpoint ini membutuhkan JWT.
url: "{{baseUrl}}/api/products"
method: GET
headers:
  Authorization: Bearer {{token}}
scripts:
  - type: afterResponse
    code: |-
      const json = pm.response.json();
      pm.test("status 200", () => pm.response.to.have.status(200));
      pm.test("success true", () => pm.expect(json.success).to.eql(true));
      pm.test("data is array", () => pm.expect(json.data).to.be.an("array"));
      pm.test("minimal 1 product", () => pm.expect(json.data.length).to.be.at.least(1));
    language: text/javascript
order: 1000
